name: Apply Product Patch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply patch
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          def write_if_changed(path, text):
              p = Path(path)
              old = p.read_text(encoding='utf-8')
              if old != text:
                  p.write_text(text, encoding='utf-8')
                  return True
              return False

          changed = False

          # 1) negotiationCalculator.ts - RFB entrada fixa 10% e campos de pagamento
          p = Path('lib/negotiationCalculator.ts')
          text = p.read_text(encoding='utf-8')
          if 'rfbEntradaParcelas?: number;' not in text:
              text = text.replace(
                  '  selicMensalEstimativa?: number;\n',
                  '  selicMensalEstimativa?: number;\n  rfbEntradaParcelas?: number;\n  rfbSaldoParcelas?: number;\n'
              )
          text = text.replace(
              '      entryPercent: 0,\n      entryInstallments: 1,\n      balanceMonths: 60,',
              '      entryPercent: 0.1,\n      entryInstallments: months(input.rfbEntradaParcelas, 1),\n      balanceMonths: months(input.rfbSaldoParcelas, 60),'
          )
          text = text.replace(
              '        "Sem desconto.",\n        "Alternativa para debito ainda sob administracao da Receita Federal.",',
              '        "Sem desconto.",\n        "Entrada padrao de 10% para simulacao de parcelamento Receita/e-CAC.",\n        "Alternativa para debito ainda sob administracao da Receita Federal.",'
          )
          changed |= write_if_changed(p, text)

          # 2) NegotiationCalculator.tsx - campos RFB e comparativo atual x potencial
          p = Path('components/NegotiationCalculator.tsx')
          text = p.read_text(encoding='utf-8')
          if 'rfbEntradaParcelas: initialValues?.rfbEntradaParcelas ?? 1,' not in text:
              text = text.replace(
                  '    selicMensalEstimativa: initialValues?.selicMensalEstimativa ?? 0,\n',
                  '    selicMensalEstimativa: initialValues?.selicMensalEstimativa ?? 0,\n    rfbEntradaParcelas: initialValues?.rfbEntradaParcelas ?? 1,\n    rfbSaldoParcelas: initialValues?.rfbSaldoParcelas ?? 60,\n'
              )
          if '<FormBlock title="Receita Federal / e-CAC">' not in text:
              text = text.replace(
                  '          </FormBlock>\n\n          <FormBlock title="Enquadramento">',
                  '''          </FormBlock>

          <FormBlock title="Receita Federal / e-CAC">
            <div className="rounded-md border border-amber-200 bg-amber-50 p-3 text-xs leading-5 text-amber-800">
              Entrada fixa de 10% para o parcelamento da Receita Federal. Ajuste apenas a forma de pagamento: parcelas da entrada e parcelas do saldo.
            </div>
            <NumberField
              label="Parcelas da entrada RFB"
              value={input.rfbEntradaParcelas ?? 1}
              onChange={(value) => update("rfbEntradaParcelas", value)}
              integer
            />
            <NumberField
              label="Parcelas do saldo RFB"
              value={input.rfbSaldoParcelas ?? 60}
              onChange={(value) => update("rfbSaldoParcelas", value)}
              integer
            />
          </FormBlock>

          <FormBlock title="Enquadramento">'''
              )
          if 'const currentScenarioInstallment = scenario.debt > 0 ? scenario.debt / 60 : 0;' not in text:
              text = text.replace(
                  '  const isBlocked = scenario.alerts.some((alert) => alert.toLowerCase().includes("bloqueado"));\n',
                  '  const isBlocked = scenario.alerts.some((alert) => alert.toLowerCase().includes("bloqueado"));\n  const currentScenarioInstallment = scenario.debt > 0 ? scenario.debt / 60 : 0;\n  const potentialEconomy = scenario.debt - scenario.totalNegotiated;\n'
              )
          if 'Atual x potencial' not in text:
              text = text.replace(
                  '      </div>\n\n      <div className="mt-4 grid gap-3 md:grid-cols-4">',
                  '''      </div>

      <section className="mt-4 rounded-lg border border-emerald-200 bg-emerald-50 p-3">
        <div className="flex flex-wrap items-center justify-between gap-3">
          <div>
            <p className="text-xs font-semibold uppercase text-emerald-700">Atual x potencial</p>
            <p className="mt-1 text-sm text-emerald-900">Comparativo entre seguir no cenário comum e negociar pelo cenário selecionado.</p>
          </div>
          <div className="rounded-md bg-white px-4 py-2 text-right shadow-sm">
            <p className="text-xs font-semibold uppercase text-emerald-700">Potencial de economia</p>
            <p className="text-xl font-bold text-emerald-900">{formatCurrency(potentialEconomy)}</p>
          </div>
        </div>
        <div className="mt-3 grid gap-3 md:grid-cols-3">
          <Metric label="Caso atual / referência" value={`${formatCurrency(currentScenarioInstallment)} x 60`} />
          <Metric label="Caso potencial" value={`${formatCurrency(scenario.balanceInstallment)} x ${scenario.balanceMonths}`} />
          <Metric label="Diferença estimada" value={formatCurrency(potentialEconomy)} />
        </div>
      </section>

      <div className="mt-4 grid gap-3 md:grid-cols-4">'''
              )
          changed |= write_if_changed(p, text)

          # 3) LeadDetailPage.tsx - aba Perfil do Cliente separada do Financeiro
          p = Path('pages/LeadDetailPage.tsx')
          text = p.read_text(encoding='utf-8')
          text = text.replace(
              'const TABS = ["visao", "receitas", "debitos", "fiscal", "negociacoes", "simulacoes", "estrategias", "parecer", "proposta", "financeiro", "relatorio"] as const;',
              'const TABS = ["visao", "receitas", "debitos", "fiscal", "negociacoes", "simulacoes", "estrategias", "parecer", "proposta", "cliente", "financeiro", "agenda", "relatorio"] as const;'
          )
          if 'cliente: "Perfil do cliente",' not in text:
              text = text.replace(
                  '  proposta: "Proposta",\n  financeiro: "Financeiro",',
                  '  proposta: "Proposta",\n  cliente: "Perfil do cliente",\n  financeiro: "Financeiro",\n  agenda: "Agenda interna",'
              )
          if '{tab === "cliente" && <ClientProfileTab crm={crm} onChange={setCrm} />}' not in text:
              text = text.replace(
                  '        {tab === "financeiro" && <FinancialTab crm={crm} onChange={setCrm} />}\n        {tab === "relatorio" && <ReportTab record={record} crm={crm} insights={insights} onChange={setCrm} />}',
                  '        {tab === "cliente" && <ClientProfileTab crm={crm} onChange={setCrm} />}\n        {tab === "financeiro" && <FinancialTab crm={crm} onChange={setCrm} />}\n        {tab === "agenda" && <AgendaTab crm={crm} onChange={setCrm} />}\n        {tab === "relatorio" && <ReportTab record={record} crm={crm} insights={insights} onChange={setCrm} />}'
              )

          client_tab = '''
function ClientProfileTab({ crm, onChange }: { crm: LeadCrmData; onChange: (crm: LeadCrmData) => void }) {
  const clientProfile = crm.clientProfile;
  const updateClientProfile = (updates: Partial<LeadCrmData["clientProfile"]>) =>
    onChange({ ...crm, clientProfile: { ...clientProfile, ...updates } });

  return (
    <section className="rounded-lg border border-neutral-200 bg-white p-4">
      <div className="flex items-center gap-2">
        <FileText className="h-5 w-5 text-petroleum-700" />
        <h2 className="text-base font-semibold text-ink">Perfil do cliente</h2>
      </div>
      <p className="mt-2 text-sm text-neutral-500">
        Dados comerciais e de relacionamento. Não é financeiro e não interfere no pipeline de cobrança.
      </p>
      <div className="mt-4 grid gap-4 lg:grid-cols-2">
        <InputField label="Decisor" value={clientProfile.decisionMaker} onChange={(value) => updateClientProfile({ decisionMaker: value })} placeholder="Socio, financeiro, contador..." />
        <InputField label="Contato financeiro" value={clientProfile.financialContact} onChange={(value) => updateClientProfile({ financialContact: value })} placeholder="Quem paga/aprova contrato" />
        <TextAreaField label="Perfil e contexto do cliente" value={clientProfile.businessContext} onChange={(value) => updateClientProfile({ businessContext: value })} rows={5} placeholder="Tamanho, urgencia, cultura, decisores, pressao de caixa..." />
        <TextAreaField label="Objecoes" value={clientProfile.objections} onChange={(value) => updateClientProfile({ objections: value })} rows={5} placeholder="Preco, medo, timing, concorrencia, burocracia..." />
        <TextAreaField label="Status dos documentos" value={clientProfile.documentsStatus} onChange={(value) => updateClientProfile({ documentsStatus: value })} rows={5} placeholder="O que ja veio, o que falta, quem ficou de enviar..." />
        <TextAreaField label="Notas de relacionamento" value={clientProfile.relationshipNotes} onChange={(value) => updateClientProfile({ relationshipNotes: value })} rows={5} placeholder="Historico de conversas, tom de abordagem, canais preferidos..." />
      </div>
    </section>
  );
}

function AgendaTab({ crm, onChange }: { crm: LeadCrmData; onChange: (crm: LeadCrmData) => void }) {
  const financial = crm.financial;
  const updateFinancial = (updates: Partial<LeadCrmData["financial"]>) =>
    onChange({ ...crm, financial: { ...financial, ...updates } });

  return (
    <div className="grid gap-5 xl:grid-cols-[380px_1fr]">
      <section className="rounded-lg border border-neutral-200 bg-white p-4">
        <div className="flex items-center gap-2">
          <CalendarClock className="h-5 w-5 text-petroleum-700" />
          <h2 className="text-base font-semibold text-ink">Agenda interna</h2>
        </div>
        <div className="mt-4 grid gap-3">
          <InputField label="Proxima acao" value={crm.nextAction} onChange={(value) => onChange({ ...crm, nextAction: value })} />
          <InputField label="Data da proxima acao" type="date" value={crm.nextActionDate} onChange={(value) => onChange({ ...crm, nextActionDate: value })} />
          <InputField label="Follow-up da proposta" type="date" value={financial.proposalFollowUpDate} onChange={(value) => updateFinancial({ proposalFollowUpDate: value })} />
          <InputField label="Vencimento de cobrança" type="date" value={financial.paymentDueDate} onChange={(value) => updateFinancial({ paymentDueDate: value })} />
        </div>
      </section>

      <section className="rounded-lg border border-neutral-200 bg-white p-4">
        <div className="flex items-center gap-2">
          <Clipboard className="h-5 w-5 text-petroleum-700" />
          <h2 className="text-base font-semibold text-ink">Andamento e atos internos</h2>
        </div>
        <div className="mt-4 grid gap-4">
          <TextAreaField label="Andamento do trabalho" value={financial.workProgress} onChange={(value) => updateFinancial({ workProgress: value, workProgressUpdatedAt: localTodayPlus(0) })} rows={6} placeholder="Etapa atual, pendencias, proxima entrega e responsavel." />
          <p className="text-xs text-neutral-500">Ultima atualizacao: {financial.workProgressUpdatedAt || "sem registro"}</p>
          <EditableChecklist
            label="Atos selecionados"
            options={crm.customOptions.workActs}
            values={financial.requiredWorkActs}
            onChange={(values) => updateFinancial({ requiredWorkActs: values })}
            onAddOption={(value) =>
              onChange({
                ...crm,
                customOptions: { ...crm.customOptions, workActs: [...crm.customOptions.workActs, value] },
                financial: { ...financial, requiredWorkActs: Array.from(new Set([...financial.requiredWorkActs, value])) },
              })
            }
          />
        </div>
      </section>
    </div>
  );
}

'''
          if 'function ClientProfileTab(' not in text:
              text = text.replace('function FinancialTab({ crm, onChange }', client_tab + 'function FinancialTab({ crm, onChange }')

          # Remover o bloco de perfil do cliente de dentro do Financeiro, mantendo financeiro limpo.
          text = re.sub(
              r'\n\s*<section className="rounded-lg border border-neutral-200 bg-white p-4">\s*\n\s*<div className="flex items-center gap-2">\s*\n\s*<FileText className="h-5 w-5 text-petroleum-700" />\s*\n\s*<h2 className="text-base font-semibold text-ink">Perfil do cliente e andamento</h2>.*?\n\s*</section>\s*\n\s*\n\s*<section className="rounded-lg border border-neutral-200 bg-white p-4">\s*\n\s*<div className="flex items-center gap-2">\s*\n\s*<Clipboard className="h-5 w-5 text-petroleum-700" />\s*\n\s*<h2 className="text-base font-semibold text-ink">Atos de trabalho necessarios</h2>.*?\n\s*</section>',
              '',
              text,
              flags=re.S,
          )
          changed |= write_if_changed(p, text)

          if changed:
              print('Patch aplicado.')
          else:
              print('Nenhuma alteração necessária.')
          PY

      - name: Validate
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Commit patch
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "drjfalcao-bot"
            git config user.email "dr.jfalcao@gmail.com"
            git add lib/negotiationCalculator.ts components/NegotiationCalculator.tsx pages/LeadDetailPage.tsx
            git commit -m "ajusta simulacao pagamento e separa perfil cliente"
            git push
          else
            echo "Sem mudanças para commitar."
          fi
